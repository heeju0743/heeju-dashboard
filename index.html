<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>테마별 대장주 순위</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f0e8;--card:#fff;--accent:#c9a84c;--accent2:#e8d5a3;
  --text:#3a3020;--text2:#7a6a50;--border:#e8dcc8;--active:#fff3dc;
  --red:#e05c5c;--green:#5c9e6e;--blue:#5c7ae0;--purple:#8c5ce0
}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px}
.sub{font-size:12px;color:var(--text2);margin-bottom:18px}

/* 테마 탭 */
.theme-scroll{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.theme-btn{padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:.15s;white-space:nowrap;font-family:inherit}
.theme-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
.theme-btn:hover:not(.active){background:var(--active);color:var(--text)}

/* 패널 */
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#1a2744,#2a3a5c)}
.panel-title{font-size:15px;font-weight:700;color:#fff}
.panel-meta{font-size:11px;color:rgba(255,255,255,.6)}

/* 밸류체인 섹션 */
.value-chain-wrap{padding:12px 18px;background:#f8f6f0;border-bottom:1px solid var(--border)}
.vc-label{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:7px;letter-spacing:.5px}
.vc-steps{display:flex;gap:0;flex-wrap:wrap;align-items:center}
.vc-step{background:var(--accent2);color:var(--text);padding:4px 10px;font-size:11px;font-weight:600;border-radius:4px;white-space:nowrap}
.vc-arrow{color:var(--accent);font-size:12px;margin:0 4px;flex-shrink:0}
.vc-desc{font-size:11px;color:var(--text2);margin-top:6px;line-height:1.6}

/* 추가 바 */
.add-bar{display:flex;gap:8px;padding:10px 18px;border-bottom:1px solid var(--border);background:#fafaf7;flex-wrap:wrap}
.add-bar input{padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;color:var(--text);outline:none}
.add-bar input:focus{border-color:var(--accent)}
.inp-name{flex:2;min-width:100px}
.inp-code{width:100px}
.inp-chain{flex:2;min-width:120px}
.add-btn{padding:6px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.add-btn:hover{background:#b8942e}

/* 파일 첨부 */
.file-attach-wrap{padding:8px 18px;border-bottom:1px solid var(--border);background:#fafaf7;display:flex;align-items:center;gap:10px}
.file-attach-label{font-size:11px;color:var(--text2);white-space:nowrap}
.file-upload-btn{padding:5px 12px;border-radius:8px;border:1px dashed var(--border);background:var(--card);font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit;transition:.15s}
.file-upload-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--active)}
.file-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.file-chip{display:inline-flex;align-items:center;gap:5px;background:var(--active);border:1px solid var(--accent2);border-radius:9px;padding:3px 9px;font-size:11px;color:var(--text)}
.file-chip a{color:var(--blue);text-decoration:none;font-size:11px}
.file-chip a:hover{text-decoration:underline}
.file-chip .fc-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:0 2px;line-height:1}
.file-chip .fc-del:hover{color:var(--red)}
.limit-msg{font-size:11px;color:var(--red);padding:6px 18px;background:#fde8e8;border-bottom:1px solid #fbc8c8}

/* 종목 리스트 */
.stock-list{list-style:none}
.stock-item{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid var(--border);transition:background .1s;cursor:default}
.stock-item:last-child{border-bottom:none}
.stock-item:hover{background:#fffdf8}
.stock-item.dragging{opacity:.4}
.stock-item.drag-over{background:#fff3dc;border-left:3px solid var(--accent)}
.rank-num{font-size:12px;font-weight:700;min-width:22px;text-align:center;color:var(--text2)}
.rank-num.top1{color:#c9a84c;font-size:15px}
.rank-num.top2{color:#9da8ad;font-size:14px}
.rank-num.top3{color:#a07060;font-size:13px}
.drag-handle{cursor:grab;color:#ccc;font-size:16px;padding:0 2px;user-select:none}
.drag-handle:active{cursor:grabbing}
.stock-info{flex:1;min-width:0}
.stock-name-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.stock-name{font-size:13px;font-weight:600;color:var(--text)}
.stock-code{font-size:10px;color:var(--text2);background:#f0e8d8;padding:1px 6px;border-radius:5px}
.stock-chain{font-size:10px;color:var(--blue);background:#e8ecfd;padding:1px 7px;border-radius:5px}
.stock-files{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.stock-file-link{font-size:10px;color:var(--blue);text-decoration:none;background:#e8ecfd;padding:1px 7px;border-radius:5px;border:none;cursor:pointer;font-family:inherit}
.stock-file-link:hover{text-decoration:underline}
.btn-sm{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:.1s;flex-shrink:0}
.btn-sm:hover{background:var(--active);color:var(--text)}
.btn-sm:disabled{opacity:.3;cursor:default}
.btn-del{border-color:#fbc8c8}
.btn-del:hover{background:#fde8e8;color:var(--red);border-color:#f09595}

/* 하단 */
.bottom-bar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.add-theme-wrap{display:flex;gap:8px;flex:1;min-width:200px}
.add-theme-wrap input{flex:1;padding:7px 12px;border:1px solid var(--border);border-radius:9px;font-size:12px;font-family:inherit;background:var(--card);color:var(--text);outline:none}
.add-theme-wrap input:focus{border-color:var(--accent)}
.add-theme-btn{padding:7px 14px;border-radius:9px;border:1px solid var(--border);background:var(--card);font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}
.add-theme-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--active)}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--text)}
.modal-row{margin-bottom:12px}
.modal-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.modal-row input,.modal-row select,.modal-row textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;color:var(--text);background:#fafaf7;outline:none}
.modal-row input:focus,.modal-row select:focus,.modal-row textarea:focus{border-color:var(--accent);background:#fff}
.modal-row textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:8px 18px;border-radius:9px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:.15s}
.mbtn:hover{background:var(--active)}
.mbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.mbtn.primary:hover{background:#b8942e}

/* 파일 첨부 모달 */
.file-drop-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:.15s;background:#fafaf7;font-size:13px;color:var(--text2)}
.file-drop-area:hover{border-color:var(--accent);background:var(--active)}
.file-drop-area.dragover{border-color:var(--accent);background:#fff3dc}
.file-prev-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.file-prev-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f0e8d8;border-radius:8px;font-size:12px}
.file-prev-item .fpi-icon{font-size:16px;flex-shrink:0}
.file-prev-item .fpi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.file-prev-item .fpi-size{font-size:10px;color:var(--text2);flex-shrink:0}
.file-prev-item .fpi-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0 3px}
.file-prev-item .fpi-del:hover{color:var(--red)}

/* 편집 모달 */
.edit-stock-modal .modal-row input{width:100%}
</style>
</head>
<body>
<div class="wrap">
  <h1>📋 테마별 대장주 순위</h1>
  <p class="sub">PDF 가이드북 기반 20개 섹터 · 종목 추가/순서변경/파일첨부 가능 · 드래그앤드롭으로 순위 조정</p>

  <div class="theme-scroll" id="themeTabs"></div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="panelTitle"></span>
      <span class="panel-meta" id="panelMeta"></span>
    </div>
    <div class="value-chain-wrap" id="vcWrap" style="display:none">
      <div class="vc-label">밸류체인 구조</div>
      <div class="vc-steps" id="vcSteps"></div>
      <div class="vc-desc" id="vcDesc"></div>
    </div>
    <div class="add-bar">
      <input class="inp-name" id="addName" placeholder="종목명 (예: 삼성전자)">
      <input class="inp-code" id="addCode" placeholder="코드 (예: 005930)">
      <input class="inp-chain" id="addChain" placeholder="밸류체인 위치 (예: 제조/IDM)">
      <button class="add-btn" onclick="addStock()">+ 종목 추가</button>
    </div>
    <div id="limitMsg" class="limit-msg" style="display:none">⚠️ 최대 20개 종목까지 등록할 수 있어요.</div>

    <!-- 파일 첨부 바 (테마 공통 파일) -->
    <div class="file-attach-wrap">
      <span class="file-attach-label">📎 테마 파일:</span>
      <button class="file-upload-btn" onclick="openThemeFileModal()">+ 파일/이미지 첨부</button>
      <div class="file-chips" id="themeFileChips"></div>
    </div>

    <ul class="stock-list" id="stockList"></ul>
  </div>

  <div class="bottom-bar">
    <div class="add-theme-wrap">
      <input id="addThemeInput" placeholder="새 테마 이름 (예: 메타버스)">
      <button class="add-theme-btn" onclick="addTheme()">+ 테마 추가</button>
    </div>
    <button class="add-theme-btn" onclick="exportData()" style="border-color:var(--blue);color:var(--blue)">📤 내보내기 (JSON)</button>
    <label class="add-theme-btn" style="border-color:var(--green);color:var(--green);cursor:pointer">
      📥 불러오기
      <input type="file" accept=".json" style="display:none" onchange="importData(this)">
    </label>
  </div>
</div>

<!-- 파일 첨부 모달 (테마용) -->
<div class="modal-overlay" id="modal-theme-file">
  <div class="modal" style="width:480px">
    <div class="modal-title">📎 테마 파일 첨부</div>
    <div class="file-drop-area" id="themeDropArea" onclick="document.getElementById('themeFileIn').click()"
      ondrop="handleThemeFileDrop(event)" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')">
      📁 클릭하거나 파일을 끌어다 놓으세요<br>
      <span style="font-size:11px;margin-top:4px;display:block">이미지, PDF, 문서, 엑셀, ZIP 등 모든 파일 가능</span>
      <input type="file" id="themeFileIn" multiple style="display:none" onchange="handleThemeFileSelect(this)">
    </div>
    <div class="file-prev-list" id="themeFilePrev"></div>
    <div class="modal-actions">
      <button class="mbtn" onclick="closeModal('modal-theme-file')">취소</button>
      <button class="mbtn primary" onclick="saveThemeFiles()">저장</button>
    </div>
  </div>
</div>

<!-- 종목 파일 첨부 모달 -->
<div class="modal-overlay" id="modal-stock-file">
  <div class="modal" style="width:480px">
    <div class="modal-title">📎 종목 파일 첨부</div>
    <div class="file-drop-area" id="stockDropArea" onclick="document.getElementById('stockFileIn').click()"
      ondrop="handleStockFileDrop(event)" ondragover="event.preventDefault();this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')">
      📁 클릭하거나 파일을 끌어다 놓으세요<br>
      <span style="font-size:11px;margin-top:4px;display:block">이미지, PDF, 문서, 엑셀, 차트 등 모든 파일 가능</span>
      <input type="file" id="stockFileIn" multiple style="display:none" onchange="handleStockFileSelect(this)">
    </div>
    <div class="file-prev-list" id="stockFilePrev"></div>
    <div class="modal-actions">
      <button class="mbtn" onclick="closeModal('modal-stock-file')">취소</button>
      <button class="mbtn primary" onclick="saveStockFiles()">저장</button>
    </div>
  </div>
</div>

<!-- 종목 편집 모달 -->
<div class="modal-overlay" id="modal-edit-stock">
  <div class="modal edit-stock-modal">
    <div class="modal-title">✏️ 종목 수정</div>
    <div class="modal-row"><label>종목명</label><input id="edit-name"></div>
    <div class="modal-row"><label>종목코드</label><input id="edit-code"></div>
    <div class="modal-row"><label>밸류체인 위치</label><input id="edit-chain" placeholder="예: 설계/Fabless, 제조/IDM, 후공정 등"></div>
    <div class="modal-row"><label>메모</label><textarea id="edit-memo"></textarea></div>
    <div class="modal-actions">
      <button class="mbtn" onclick="closeModal('modal-edit-stock')">취소</button>
      <button class="mbtn primary" onclick="saveEditStock()">저장</button>
    </div>
  </div>
</div>

// ===== 상태 =====
let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentTheme = Object.keys(data)[0];
let dragSrc = null;
let tempThemeFiles = [];
let tempStockFiles = [];
let editStockIdx = null;
let stockFileTargetIdx = null;

// ===== localStorage 저장/불러오기 =====
function loadFromStorage(){
  try{
    const saved = localStorage.getItem('themeStocksData');
    if(saved) data = JSON.parse(saved);
  }catch(e){}
}
function saveToStorage(){
  try{ localStorage.setItem('themeStocksData', JSON.stringify(data)); }catch(e){}
}
loadFromStorage();

// ===== 렌더 =====
function renderTabs(){
  const wrap = document.getElementById('themeTabs');
  wrap.innerHTML = Object.keys(data).map(t =>
    `<button class="theme-btn${t===currentTheme?' active':''}" onclick="switchTheme('${CSS.escape(t)}')">${t}</button>`
  ).join('') +
  `<button class="theme-btn" onclick="openThemeAddModal()" style="border-style:dashed">+ 새 테마</button>`;
}

function switchTheme(t){
  currentTheme = t;
  renderTabs();
  renderPanel();
}

function renderPanel(){
  const td = data[currentTheme];
  if(!td) return;
  document.getElementById('panelTitle').textContent = currentTheme;
  document.getElementById('panelMeta').textContent = (td.stocks||[]).length + ' / 20개';
  document.getElementById('limitMsg').style.display = (td.stocks||[]).length >= 20 ? 'block' : 'none';

  // 밸류체인
  const vcWrap = document.getElementById('vcWrap');
  const vcSteps = document.getElementById('vcSteps');
  const vcDesc = document.getElementById('vcDesc');
  if(td.vc && td.vc.length){
    vcWrap.style.display = 'block';
    vcSteps.innerHTML = td.vc.map((s,i) =>
      `${i>0?'<span class="vc-arrow">→</span>':''}<span class="vc-step">${s}</span>`
    ).join('');
    vcDesc.textContent = td.vcDesc||'';
  } else {
    vcWrap.style.display = 'none';
  }

  // 테마 파일 칩
  renderThemeFileChips();

  // 종목 리스트
  renderStockList();
}

function renderThemeFileChips(){
  const el = document.getElementById('themeFileChips');
  const files = data[currentTheme].files || [];
  el.innerHTML = files.map((f,i) =>
    `<span class="file-chip">
      <span>${getFileIcon(f.name)}</span>
      <a href="${f.url}" target="_blank" download="${f.name}">${f.name.length>20?f.name.slice(0,18)+'..':f.name}</a>
      <button class="fc-del" onclick="delThemeFile(${i})">✕</button>
    </span>`
  ).join('');
}

function renderStockList(){
  const list = document.getElementById('stockList');
  const stocks = (data[currentTheme].stocks || []);
  list.innerHTML = stocks.map((s,i) => {
    const rankCls = i===0?'top1':i===1?'top2':i===2?'top3':'';
    const filesHtml = (s.files||[]).length ?
      `<div class="stock-files">${(s.files||[]).map((f,fi) =>
        `<button class="stock-file-link" onclick="openFile('${f.url}','${f.name}')">${getFileIcon(f.name)} ${f.name.length>15?f.name.slice(0,13)+'..':f.name}</button>`
      ).join('')}</div>` : '';
    return `<li class="stock-item" draggable="true" data-idx="${i}"
      ondragstart="tsDs(event,${i})" ondragover="tsDo(event,${i})" ondragleave="tsDl(event)" ondrop="tsDp(event,${i})">
      <span class="rank-num ${rankCls}">${i+1}</span>
      <span class="drag-handle" title="드래그로 순서변경">⠿</span>
      <div class="stock-info">
        <div class="stock-name-row">
          <span class="stock-name">${s.n}</span>
          ${s.c&&s.c!=='-'?`<span class="stock-code">${s.c}</span>`:''}
          ${s.ch?`<span class="stock-chain">${s.ch}</span>`:''}
        </div>
        ${s.memo?`<div style="font-size:10px;color:var(--text2);margin-top:2px">${s.memo}</div>`:''}
        ${filesHtml}
      </div>
      <button class="btn-sm" onclick="openStockFileModal(${i})" title="파일 첨부">📎</button>
      <button class="btn-sm" onclick="openEditStockModal(${i})" title="편집">✏️</button>
      <button class="btn-sm" ${i===0?'disabled':''} onclick="moveUp(${i})" title="위로">▲</button>
      <button class="btn-sm" ${i===stocks.length-1?'disabled':''} onclick="moveDown(${i})" title="아래로">▼</button>
      <button class="btn-sm btn-del" onclick="delStock(${i})" title="삭제">✕</button>
    </li>`;
  }).join('');
}

// ===== 종목 조작 =====
function addStock(){
  const name = document.getElementById('addName').value.trim();
  if(!name) return;
  if((data[currentTheme].stocks||[]).length >= 20){
    document.getElementById('limitMsg').style.display='block'; return;
  }
  data[currentTheme].stocks.push({
    n: name,
    c: document.getElementById('addCode').value.trim()||'-',
    ch: document.getElementById('addChain').value.trim(),
    files: []
  });
  document.getElementById('addName').value='';
  document.getElementById('addCode').value='';
  document.getElementById('addChain').value='';
  saveToStorage(); renderPanel();
}

function delStock(i){
  if(!confirm('삭제할까요?')) return;
  data[currentTheme].stocks.splice(i,1);
  saveToStorage(); renderPanel();
}

function moveUp(i){
  if(i===0) return;
  const arr = data[currentTheme].stocks;
  [arr[i-1],arr[i]]=[arr[i],arr[i-1]];
  saveToStorage(); renderStockList();
}

function moveDown(i){
  const arr = data[currentTheme].stocks;
  if(i===arr.length-1) return;
  [arr[i+1],arr[i]]=[arr[i],arr[i+1]];
  saveToStorage(); renderStockList();
}

// 드래그앤드롭
function tsDs(e,i){
  dragSrc=i; e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.querySelector(`[data-idx="${i}"]`);if(el)el.classList.add('dragging');},0);
}
function tsDo(e,i){
  e.preventDefault();
  document.querySelectorAll('.stock-item').forEach(el=>el.classList.remove('drag-over'));
  const el=document.querySelector(`[data-idx="${i}"]`);if(el)el.classList.add('drag-over');
}
function tsDl(e){e.currentTarget.classList.remove('drag-over');}
function tsDp(e,i){
  e.preventDefault();
  document.querySelectorAll('.stock-item').forEach(el=>{el.classList.remove('drag-over');el.classList.remove('dragging');});
  if(dragSrc===null||dragSrc===i)return;
  const arr=data[currentTheme].stocks;
  const moved=arr.splice(dragSrc,1)[0];arr.splice(i,0,moved);
  dragSrc=null; saveToStorage(); renderStockList();
}

// ===== 종목 편집 =====
function openEditStockModal(i){
  editStockIdx = i;
  const s = data[currentTheme].stocks[i];
  document.getElementById('edit-name').value = s.n||'';
  document.getElementById('edit-code').value = s.c||'';
  document.getElementById('edit-chain').value = s.ch||'';
  document.getElementById('edit-memo').value = s.memo||'';
  openModal('modal-edit-stock');
}
function saveEditStock(){
  if(editStockIdx===null) return;
  const s = data[currentTheme].stocks[editStockIdx];
  s.n = document.getElementById('edit-name').value.trim()||s.n;
  s.c = document.getElementById('edit-code').value.trim()||'-';
  s.ch = document.getElementById('edit-chain').value.trim();
  s.memo = document.getElementById('edit-memo').value.trim();
  closeModal('modal-edit-stock');
  saveToStorage(); renderPanel();
}

// ===== 테마 추가 =====
function openThemeAddModal(){
  const name = prompt('새 테마 이름을 입력하세요:');
  if(!name||!name.trim()) return;
  if(data[name.trim()]){alert('이미 있는 테마예요!');return;}
  data[name.trim()] = {vc:[],vcDesc:'',stocks:[],files:[]};
  currentTheme = name.trim();
  saveToStorage(); renderTabs(); renderPanel();
}
function addTheme(){openThemeAddModal();}

// ===== 테마 파일 =====
function openThemeFileModal(){
  tempThemeFiles = [...(data[currentTheme].files||[])];
  renderThemeFilePrev();
  openModal('modal-theme-file');
}
function handleThemeFileDrop(e){
  e.preventDefault();
  document.getElementById('themeDropArea').classList.remove('dragover');
  processFiles(Array.from(e.dataTransfer.files), 'theme');
}
function handleThemeFileSelect(input){
  processFiles(Array.from(input.files), 'theme');
  input.value='';
}
function renderThemeFilePrev(){
  const el = document.getElementById('themeFilePrev');
  el.innerHTML = tempThemeFiles.map((f,i)=>`
    <div class="file-prev-item">
      <span class="fpi-icon">${getFileIcon(f.name)}</span>
      <span class="fpi-name">${f.name}</span>
      <span class="fpi-size">${f.size||''}</span>
      <button class="fpi-del" onclick="tempThemeFiles.splice(${i},1);renderThemeFilePrev()">✕</button>
    </div>`).join('');
}
function saveThemeFiles(){
  data[currentTheme].files = [...tempThemeFiles];
  closeModal('modal-theme-file');
  saveToStorage(); renderThemeFileChips();
}
function delThemeFile(i){
  data[currentTheme].files.splice(i,1);
  saveToStorage(); renderThemeFileChips();
}

// ===== 종목 파일 =====
function openStockFileModal(i){
  stockFileTargetIdx = i;
  tempStockFiles = [...(data[currentTheme].stocks[i].files||[])];
  renderStockFilePrev();
  openModal('modal-stock-file');
}
function handleStockFileDrop(e){
  e.preventDefault();
  document.getElementById('stockDropArea').classList.remove('dragover');
  processFiles(Array.from(e.dataTransfer.files), 'stock');
}
function handleStockFileSelect(input){
  processFiles(Array.from(input.files), 'stock');
  input.value='';
}
function renderStockFilePrev(){
  const el = document.getElementById('stockFilePrev');
  el.innerHTML = tempStockFiles.map((f,i)=>`
    <div class="file-prev-item">
      <span class="fpi-icon">${getFileIcon(f.name)}</span>
      <span class="fpi-name">${f.name}</span>
      <span class="fpi-size">${f.size||''}</span>
      <button class="fpi-del" onclick="tempStockFiles.splice(${i},1);renderStockFilePrev()">✕</button>
    </div>`).join('');
}
function saveStockFiles(){
  if(stockFileTargetIdx===null) return;
  data[currentTheme].stocks[stockFileTargetIdx].files = [...tempStockFiles];
  closeModal('modal-stock-file');
  saveToStorage(); renderPanel();
}

// ===== 파일 처리 (base64 변환) =====
function processFiles(files, target){
  const promises = files.map(f => new Promise(res=>{
    const reader = new FileReader();
    reader.onload = e => res({name:f.name, url:e.target.result, size:formatSize(f.size)});
    reader.readAsDataURL(f);
  }));
  Promise.all(promises).then(results=>{
    if(target==='theme'){
      tempThemeFiles.push(...results);
      renderThemeFilePrev();
    } else {
      tempStockFiles.push(...results);
      renderStockFilePrev();
    }
  });
}

function openFile(url, name){
  const a = document.createElement('a');
  a.href = url; a.download = name; a.target='_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function formatSize(bytes){
  if(bytes<1024) return bytes+'B';
  if(bytes<1024*1024) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

function getFileIcon(name){
  const ext = (name||'').split('.').pop().toLowerCase();
  const map = {pdf:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',ppt:'📊',pptx:'📊',
    png:'🖼️',jpg:'🖼️',jpeg:'🖼️',gif:'🖼️',webp:'🖼️',
    zip:'📦',rar:'📦',mp4:'🎬',mp3:'🎵',txt:'📃',csv:'📊',json:'⚙️'};
  return map[ext]||'📎';
}

// ===== 내보내기/불러오기 =====
function exportData(){
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='theme_stocks.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function importData(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const imported = JSON.parse(e.target.result);
      if(confirm('현재 데이터를 덮어쓸까요?')){
        data = imported;
        currentTheme = Object.keys(data)[0];
        saveToStorage(); renderTabs(); renderPanel();
      }
    }catch(err){alert('유효하지 않은 파일입니다.');}
  };
  r.readAsText(f);
}

// ===== 모달 =====
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});
});

// Enter 키
document.getElementById('addName').addEventListener('keydown',e=>{if(e.key==='Enter')addStock();});

// ===== 초기화 =====
renderTabs();
renderPanel();
</script>
</body>
</html>
